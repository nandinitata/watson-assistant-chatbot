<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Crust Bakery Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdf6f0;
            color: #3b2f2f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 700px;
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 0.5rem;
            color: #8b4513;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #6b4226;
            margin-bottom: 2rem;
        }
        .chatbot-link {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #8b4513;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2rem;
            transition: background 0.3s;
        }
        .chatbot-link:hover {
            background: #a0522d;
        }
        .info {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #7a5c4f;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sweet Crust Bakery</h1>
        <p class="subtitle">IBM Watson Assistant Chatbot</p>
        <a class="chatbot-link" href="https://sites.google.com/colorado.edu/stat-5350midterm/home" target="_blank">
            Launch Chatbot
        </a>
        <div class="info">
            <p>This chatbot helps customers place orders, check hours, view specials, ask about allergens, and more.</p>
            <p>Built with IBM Watson Assistant.</p>
        </div>
    </div>
</body>
</html>
